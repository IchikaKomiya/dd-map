name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Node.js 20 を使う既存アクションを先行的に Node.js 24 ランタイムで動かす
# （2026-06-02 以降 GitHub Actions 側で強制化される予定）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ./app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # prebuild フックで ../data.csv -> public/data.csv が自動コピーされる
      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: /dd-map
        run: pnpm build

      # GitHub Pages は _next/ などアンダースコア接頭辞をJekyll扱いでスキップするため
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # リポジトリ root の data.csv（GASがpushする本番データ）を public/ にコピー
      - name: Copy data.csv into public/
        run: |
          if [ -f data.csv ]; then
            cp data.csv public/data.csv
            echo "Copied data.csv ($(wc -l < data.csv) lines)"
          else
            echo "Warning: data.csv not found at repo root. Using existing public/data.csv."
          fi

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: /dd-map
        run: pnpm build

      # GitHub Pages は _next/ などアンダースコア接頭辞をJekyll扱いでスキップするため
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
